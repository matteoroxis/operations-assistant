spring:
  application:
    name: operations-assistant

  data:
    mongodb:
      # Set MONGODB_URI env var to your Atlas connection string
      # e.g. mongodb+srv://<user>:<password>@cluster0.xxxxx.mongodb.net/?retryWrites=true&w=majority
      uri: ${MONGODB_URI:mongodb://localhost:27017/ops_assistant?appName=devrel-github-java-agentic-workflows-foojay}
      database: ${MONGODB_DATABASE:ops_assistant}
      # Automatically create @Indexed indexes.
      # Requires Atlas M10+ for programmatic TTL index creation on checkpoints.expiresAt.
      # On Atlas M0 free tier: set auto-index-creation=false and create the TTL index manually
      # in Atlas UI → Collections → checkpoints → Indexes: { expiresAt: 1 }, expireAfterSeconds=0.
      auto-index-creation: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5.4-mini
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 1536

    vectorstore:
      mongodb:
        # Collection name used to store knowledge chunks
        collection-name: knowledge_chunks
        # Name of the Atlas Vector Search index — must match what you create in Atlas UI
        index-name: knowledge_vector_index
        # Field path that stores the embedding vector
        path-name: embedding
        # Set to true only if your Atlas cluster supports programmatic index creation
        # (Atlas M10+ via createSearchIndex command). For M0 free tier, create the
        # index manually in Atlas UI → Collections → Search Indexes.
        initialize-schema: false
        # Metadata fields that can be used in filter expressions
        metadata-fields-to-filter:
          - sourceType
          - system
          - environment
          - severity
          - team

ops-assistant:
  memory:
    # Name of the memories collection (long-term memory)
    collection-name: memories
    # Atlas Vector Search index name for memories — create manually in Atlas UI
    index-name: memories_vector_index
    # Top-K results for long-term memory recall
    top-k: 5
    # Minimum similarity threshold for memory recall
    similarity-threshold: 0.6

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    it.matteoroxis.opsassistant: DEBUG
    org.springframework.ai: INFO
    org.springframework.data.mongodb: WARN
  pattern:
    # Include MDC keys conversationId and userId in every log line when present
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [convId=%X{conversationId:-−} uid=%X{userId:-−}] - %msg%n"
